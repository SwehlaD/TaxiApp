databases:
  - name: taxi-app-db
    plan: free

services:
  - type: web
    name: taxi-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: APP_SECRET
        generateValue: true
      - key: ADMIN_PHONE
        value: "2223334444"
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: taxi-app-db
          property: connectionString